services:
  - type: web
    name: student-management-app
    env: node
    plan: free
    branch: main
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_PATH
        value: /data/students.db
      - key: JWT_SECRET
        value: replace-with-your-secret
      - key: JWT_EXPIRES_IN
        value: 1d
